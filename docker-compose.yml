version: '3'

volumes:
  data_pq_volume:
  minio_data:

#Docker Networks
networks:
  app-network:
    driver: bridge

services:
  ui:
    image: lazarus-ui:latest
    restart: unless-stopped
    networks:
      - app-network
    expose:
      - "3000"
    environment:
      NODE_ENV: "production"
      HOST: "0.0.0.0"
      PORT: "3000"

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        CONF_PATH: configs/app_conf_docker.yml
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      dbPostgres:
        condition: service_healthy
    networks:
      - app-network
    command: [ "/app/binary", "--config", "configs/app_conf_docker.yml" ]

  dbPostgres:
    image: postgres:16.3
    env_file:
      - configs/common.env
    ports:
      - "5559:5432"
    networks:
      - app-network
    volumes:
      - data_pq_volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Console UI
    volumes:
      - minio_data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 5s
      timeout: 3s
      retries: 20

  # Creates bucket at startup
  minio_init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - app-network
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb -p local/lazarus || true;
      "

