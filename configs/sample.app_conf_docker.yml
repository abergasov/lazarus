    prep:   { provider: anthropic, model: claude-sonnet-4-6 }
    during: { provider: anthropic, model: claude-haiku-4-5-20251001 }
    after:  { provider: anthropic, model: claude-sonnet-4-6 }
    vision: { provider: anthropic, model: claude-sonnet-4-6 }
    embed:  { provider: openai,    model: text-embedding-3-small }